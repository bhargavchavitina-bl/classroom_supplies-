kind = "web"
previewPath = "/"
title = "Classroom Supplies Tracker"
version = "1.0.0"
id = "artifacts/classroom-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21969

[services.development]
run = "pnpm --filter @workspace/classroom-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/classroom-tracker", "run", "build" ]
publicDir = "artifacts/classroom-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21969"
BASE_PATH = "/"
