openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Classroom Supplies Usage & Replenishment Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: supplies
    description: Supply inventory management
  - name: usage-logs
    description: Supply usage logging
  - name: dashboard
    description: Dashboard summaries and analytics
  - name: classrooms
    description: Classroom management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /supplies:
    get:
      operationId: listSupplies
      tags: [supplies]
      summary: List all supplies
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of supplies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supply"
    post:
      operationId: createSupply
      tags: [supplies]
      summary: Create a supply item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplyInput"
      responses:
        "201":
          description: Created supply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supply"

  /supplies/low-stock:
    get:
      operationId: getLowStockSupplies
      tags: [supplies]
      summary: Get supplies at or below reorder threshold
      responses:
        "200":
          description: Low stock supplies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supply"

  /supplies/categories:
    get:
      operationId: listCategories
      tags: [supplies]
      summary: List all supply categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /supplies/{id}:
    get:
      operationId: getSupply
      tags: [supplies]
      summary: Get a supply by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supply details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supply"
        "404":
          description: Not found
    patch:
      operationId: updateSupply
      tags: [supplies]
      summary: Update a supply
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplyUpdate"
      responses:
        "200":
          description: Updated supply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supply"
        "404":
          description: Not found
    delete:
      operationId: deleteSupply
      tags: [supplies]
      summary: Delete a supply
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /supplies/{id}/restock:
    post:
      operationId: restockSupply
      tags: [supplies]
      summary: Restock a supply item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestockInput"
      responses:
        "200":
          description: Updated supply after restock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supply"
        "404":
          description: Not found

  /usage-logs:
    get:
      operationId: listUsageLogs
      tags: [usage-logs]
      summary: List usage logs
      parameters:
        - name: supplyId
          in: query
          required: false
          schema:
            type: integer
        - name: classroomId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of usage logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsageLog"
    post:
      operationId: createUsageLog
      tags: [usage-logs]
      summary: Log supply usage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsageLogInput"
      responses:
        "201":
          description: Created usage log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageLog"
        "400":
          description: Insufficient stock

  /usage-logs/{id}:
    get:
      operationId: getUsageLog
      tags: [usage-logs]
      summary: Get a usage log by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Usage log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageLog"
        "404":
          description: Not found
    delete:
      operationId: deleteUsageLog
      tags: [usage-logs]
      summary: Delete a usage log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /classrooms:
    get:
      operationId: listClassrooms
      tags: [classrooms]
      summary: List all classrooms
      responses:
        "200":
          description: List of classrooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Classroom"
    post:
      operationId: createClassroom
      tags: [classrooms]
      summary: Create a classroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomInput"
      responses:
        "201":
          description: Created classroom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"

  /classrooms/public:
    get:
      operationId: listPublicClassrooms
      tags: [classrooms]
      summary: List all classrooms for registration (public)
      responses:
        "200":
          description: List of classrooms (simplified)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicClassroom"

  /classrooms/{id}:
    get:
      operationId: getClassroom
      tags: [classrooms]
      summary: Get a classroom by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Classroom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
        "404":
          description: Not found
    patch:
      operationId: updateClassroom
      tags: [classrooms]
      summary: Update a classroom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomUpdate"
      responses:
        "200":
          description: Updated classroom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
        "404":
          description: Not found
    delete:
      operationId: deleteClassroom
      tags: [classrooms]
      summary: Delete a classroom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent supply activity
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Successfully logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid username or password

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current user
      responses:
        "200":
          description: Successfully logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current logged-in user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new teacher user account (requires admin approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Successfully registered. Pending approval.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error or username already taken.

  /requests:
    get:
      operationId: listRequests
      tags: [requests]
      summary: List supply requests
      parameters:
        - name: classroomId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Request"
    post:
      operationId: createRequest
      tags: [requests]
      summary: Submit a supply request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestInput"
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"

  /requests/{id}/approve:
    post:
      operationId: approveRequest
      tags: [requests]
      summary: Approve a supply request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestApproveInput"
      responses:
        "200":
          description: Approved request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"

  /requests/{id}/reject:
    post:
      operationId: rejectRequest
      tags: [requests]
      summary: Reject a supply request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestRejectInput"
      responses:
        "200":
          description: Rejected request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: readAllNotifications
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Success

  /notifications/{id}/read:
    post:
      operationId: readNotification
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success

  /classroom-supplies:
    get:
      operationId: listClassroomSupplies
      tags: [classrooms]
      summary: List supplies allocated to a classroom
      parameters:
        - name: classroomId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of allocated supplies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassroomSupply"

  /reports/usage:
    get:
      operationId: getUsageReport
      tags: [reports]
      summary: Get usage report data
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: daily
        - name: classroomId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Usage statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                    quantityUsed:
                      type: number
                    supplyName:
                      type: string
                    classroomName:
                      type: string

  /reports/low-stock:
    get:
      operationId: getLowStockReport
      tags: [reports]
      summary: Get low stock items
      responses:
        "200":
          description: Low stock supplies list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supply"

  /reports/most-requested:
    get:
      operationId: getMostRequestedReport
      tags: [reports]
      summary: Get most requested items
      responses:
        "200":
          description: Most requested items statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    supplyId:
                      type: integer
                    supplyName:
                      type: string
                    totalRequested:
                      type: number
                    totalApproved:
                      type: number

  /users/{id}/reset-password:
    post:
      operationId: resetPassword
      tags: [users]
      summary: Reset a teacher's password
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Success

  /users/{id}/status:
    post:
      operationId: setUserStatus
      tags: [users]
      summary: Enable or disable a teacher's account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetUserStatusInput"
      responses:
        "200":
          description: Success


components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Supply:
      type: object
      required: [id, name, category, quantity, unit, reorderThreshold, reorderQuantity, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        quantity:
          type: number
        unit:
          type: string
        reorderThreshold:
          type: number
        reorderQuantity:
          type: number
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    SupplyInput:
      type: object
      required: [name, category, quantity, unit, reorderThreshold, reorderQuantity]
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        quantity:
          type: number
          minimum: 0
        unit:
          type: string
          minLength: 1
        reorderThreshold:
          type: number
          minimum: 0
        reorderQuantity:
          type: number
          minimum: 1
        notes:
          type: string

    SupplyUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        quantity:
          type: number
          minimum: 0
        unit:
          type: string
          minLength: 1
        reorderThreshold:
          type: number
          minimum: 0
        reorderQuantity:
          type: number
          minimum: 1
        notes:
          type: string

    RestockInput:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: number
          minimum: 1
        notes:
          type: string

    UsageLog:
      type: object
      required: [id, supplyId, supplyName, quantityUsed, usedBy, usedAt]
      properties:
        id:
          type: integer
        supplyId:
          type: integer
        supplyName:
          type: string
        classroomId:
          type: ["integer", "null"]
        classroomName:
          type: ["string", "null"]
        quantityUsed:
          type: number
        usedBy:
          type: string
        notes:
          type: ["string", "null"]
        usedAt:
          type: string

    UsageLogInput:
      type: object
      required: [supplyId, quantityUsed, usedBy]
      properties:
        supplyId:
          type: integer
        classroomId:
          type: integer
        quantityUsed:
          type: number
          minimum: 0.01
        usedBy:
          type: string
          minLength: 1
        notes:
          type: string

    DashboardSummary:
      type: object
      required: [totalSupplies, lowStockCount, outOfStockCount, totalUsageToday, totalUsageThisWeek, categoryCounts]
      properties:
        totalSupplies:
          type: integer
        lowStockCount:
          type: integer
        outOfStockCount:
          type: integer
        totalUsageToday:
          type: integer
        totalUsageThisWeek:
          type: integer
        categoryCounts:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    Classroom:
      type: object
      required: [id, name, grade, teacher, roomNumber, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        grade:
          type: string
        teacher:
          type: string
        roomNumber:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ClassroomInput:
      type: object
      required: [name, grade, teacher, roomNumber, teacherUsername, teacherPassword]
      properties:
        name:
          type: string
          minLength: 1
        grade:
          type: string
          minLength: 1
        teacher:
          type: string
          minLength: 1
        roomNumber:
          type: string
          minLength: 1
        notes:
          type: string
        teacherUsername:
          type: string
          minLength: 3
        teacherPassword:
          type: string
          minLength: 6

    ClassroomUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        grade:
          type: string
          minLength: 1
        teacher:
          type: string
          minLength: 1
        roomNumber:
          type: string
          minLength: 1
        notes:
          type: string
        teacherUsername:
          type: string
          minLength: 3
        teacherPassword:
          type: string
          minLength: 6
        approved:
          type: boolean


    ActivityItem:
      type: object
      required: [id, supplyId, supplyName, quantityUsed, usedBy, usedAt, type]
      properties:
        id:
          type: integer
        supplyId:
          type: integer
        supplyName:
          type: string
        quantityUsed:
          type: number
        usedBy:
          type: string
        notes:
          type: ["string", "null"]
        usedAt:
          type: string
        type:
          type: string
          enum: [usage, restock]

    User:
      type: object
      required: [id, username, name, role, approved]
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, teacher]
        approved:
          type: boolean
        classroomId:
          type: ["integer", "null"]

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    Request:
      type: object
      required: [id, classroomId, classroomName, supplyId, supplyName, requestedQuantity, status, requestedAt]
      properties:
        id:
          type: integer
        classroomId:
          type: integer
        classroomName:
          type: string
        supplyId:
          type: integer
        supplyName:
          type: string
        requestedQuantity:
          type: number
        approvedQuantity:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        remarks:
          type: ["string", "null"]
        requestedAt:
          type: string
        approvedAt:
          type: ["string", "null"]

    RequestInput:
      type: object
      required: [supplyId, requestedQuantity]
      properties:
        supplyId:
          type: integer
        requestedQuantity:
          type: number
          minimum: 0.01

    RequestApproveInput:
      type: object
      properties:
        approvedQuantity:
          type: number
          minimum: 0.01
        remarks:
          type: string

    RequestRejectInput:
      type: object
      properties:
        remarks:
          type: string

    ClassroomSupply:
      type: object
      required: [id, classroomId, classroomName, supplyId, supplyName, quantity, unit]
      properties:
        id:
          type: integer
        classroomId:
          type: integer
        classroomName:
          type: string
        supplyId:
          type: integer
        supplyName:
          type: string
        quantity:
          type: number
        unit:
          type: string

    Notification:
      type: object
      required: [id, message, type, read, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: ["integer", "null"]
        message:
          type: string
        type:
          type: string
        read:
          type: boolean
        createdAt:
          type: string

    ResetPasswordInput:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 6

    SetUserStatusInput:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean

    RegisterInput:
      type: object
      required: [username, name, password, classroomId]
      properties:
        username:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 6
        classroomId:
          type: integer

    PublicClassroom:
      type: object
      required: [id, name, grade]
      properties:
        id:
          type: integer
        name:
          type: string
        grade:
          type: string

