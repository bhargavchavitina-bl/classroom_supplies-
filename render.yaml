services:
  - type: web
    name: classroom-supply-tracker-api
    env: node
    region: oregon
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server build
    startCommand: corepack enable && pnpm --filter @workspace/db run push-force && pnpm --filter @workspace/db run seed && node backend/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://venkateshbainaboyina2007-dev.github.io
